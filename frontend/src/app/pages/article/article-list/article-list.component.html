
<div class="page-header ph-articles"><div class="container"><h1>Cẩm Nang Du Lịch</h1><p>Kinh nghiệm, mẹo hay và lịch trình từ những người đã đi</p></div></div>
<section class="section">
  <div class="container">
    <div class="filters-bar">
      <div class="filter-search">
        <span class="material-icons">search</span>
        <input type="text" [(ngModel)]="search" (ngModelChange)="loadArticles()" placeholder="Tìm kiếm bài viết..." class="search-input">
      </div>
      <div class="filter-chips">
        <div class="chip-group">
          <span class="material-icons chip-icon">category</span>
          <select class="chip-select" [(ngModel)]="category" (change)="loadArticles()">
            <option value="">Tất cả</option>
            <option *ngFor="let c of categories" [value]="c.slug">{{ c.name }}</option>
          </select>
        </div>
      </div>
    </div>
    <div class="loading-spinner" *ngIf="loading"><div class="spinner"></div></div>
    <div class="grid grid-3" *ngIf="!loading">
      <a *ngFor="let a of articles" [routerLink]="['/articles', a.slug]" class="card article-card fade-in">
        <div class="card-image">
          <!-- Slider ảnh nếu có nhiều ảnh -->
          <ng-container *ngIf="a.images && a.images.length > 1">
            <div class="image-slider">
              <div class="slider-container" [style.transform]="'translateX(-' + (a.currentImageIndex || 0) * 100 + '%)'">
                <img *ngFor="let img of a.images" [src]="img.url" [alt]="a.title">
              </div>
              <!-- Chấm điều hướng -->
              <div class="slider-dots">
                <span *ngFor="let img of a.images; let i = index"
                      [class.active]="i === (a.currentImageIndex || 0)"
                      (click)="setArticleImageIndex(a, i, $event)"></span>
              </div>
              <!-- Mũi tên điều hướng -->
              <button class="slider-arrow prev" (click)="prevImage(a, $event)">
                <span class="material-icons">chevron_left</span>
              </button>
              <button class="slider-arrow next" (click)="nextImage(a, $event)">
                <span class="material-icons">chevron_right</span>
              </button>
            </div>
          </ng-container>
          <!-- Một ảnh hoặc ảnh dự phòng -->
          <ng-container *ngIf]="!a.images || a.images.length <= 1">
            <img [src]="getArticleImage(a)" [alt]="a.title">
          </ng-container>
          <span class="badge badge-primary card-badge-top">{{ a.category?.name }}</span>
        </div>
        <div class="card-body">
          <h3>{{ a.title }}</h3>
          <p class="excerpt">{{ a.excerpt }}</p>
          <div class="card-meta">
            <span><span class="material-icons">visibility</span> {{ a.viewCount }}</span>
            <span><span class="material-icons">calendar_today</span> {{ a.publishedAt | date:'dd/MM/yyyy' }}</span>
          </div>
        </div>
      </a>
    </div>
    <div class="pagination" *ngIf="!loading && pagination.totalPages > 1">
      <button *ngFor="let p of pageNumbers" [class.active]="p === pagination.page" (click)="goToPage(p)">{{ p }}</button>
    </div>
  </div>
</section>

<style>
.image-slider {
  position: relative;
  width: 100%;
  height: 200px;
  overflow: hidden;
}
.slider-container {
  display: flex;
  transition: transform 0.3s ease;
  height: 100%;
}
.slider-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  flex-shrink: 0;
}
.slider-dots {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
  z-index: 2;
}
.slider-dots span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  cursor: pointer;
  transition: all 0.2s;
}
.slider-dots span.active {
  background: white;
  transform: scale(1.2);
}
.slider-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 32px;
  height: 32px;
  border: none;
  background: rgba(0,0,0,0.4);
  color: white;
  border-radius: 50%;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.slider-arrow .material-icons {
  font-size: 20px;
}
.image-slider:hover .slider-arrow {
  opacity: 1;
}
.slider-arrow:hover {
  background: rgba(0,0,0,0.7);
}
.slider-arrow.prev {
  left: 8px;
}
.slider-arrow.next {
  right: 8px;
}
</style>
