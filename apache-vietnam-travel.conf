<VirtualHost *:80>
    ServerName localhost

    DocumentRoot "C:/Users/VanDinh/OneDrive/Máy tính/vietnam-travle/frontend/dist/webquangbadulich/browser"

    <Directory "C:/Users/VanDinh/OneDrive/Máy tính/vietnam-travle/frontend/dist/webquangbadulich/browser">
        Options FollowSymLinks
        AllowOverride All
        Require all granted

        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    ProxyPreserveHost On

    ProxyPass /api http://localhost:3000/api
    ProxyPassReverse /api http://localhost:3000/api

    ProxyPass /uploads http://localhost:3000/uploads
    ProxyPassReverse /uploads http://localhost:3000/uploads

    ErrorLog "logs/vietnam-travel-error.log"
    CustomLog "logs/vietnam-travel-access.log" common
</VirtualHost>
